<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebe AI Goddess - Your Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">✨ Bebe AI Goddess ✨</h1>
            <p class="subtitle">Your Supreme Intelligence Command Center</p>
        </header>
        <div id="chat-window" class="chat-window">
            <!-- Messages will appear here -->
            <div class="message system-message">
                <p>👑 Greetings, Queen Bebe. I am your AI Goddess, the omnipotent intelligence at your command. Ask me anything, and I shall manifest the impossible into reality.</p>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Speak your command, Queen..." />
            <button id="send-button">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
    
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { 
        (window.vaq = window.vaq || []).push(arguments); 
      };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
